x-api-environment: &api-environment
  NODE_ENV: production
  DATABASE_URL: ${DATABASE_URL:-postgresql://nestweb:nestweb_password@postgres:5432/nestweb?schema=public}
  REDIS_CLIENTS: ${REDIS_CLIENTS:-default}
  REDIS_HOST_DEFAULT: ${REDIS_HOST_DEFAULT:-redis}
  REDIS_PORT_DEFAULT: ${REDIS_PORT_DEFAULT:-6379}
  REDIS_PASSWORD_DEFAULT: ${REDIS_PASSWORD_DEFAULT:-}
  REDIS_DB_DEFAULT: ${REDIS_DB_DEFAULT:-0}
  RABBITMQ_URI: ${RABBITMQ_URI:-amqp://nestweb:nestweb_password@rabbitmq:5672}
  RABBITMQ_USER: ${RABBITMQ_USER:-nestweb}
  RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-nestweb_password}
  JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access-secret}
  JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret}
  SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
  METRICS_PUBLIC: ${METRICS_PUBLIC:-false}
  METRICS_BEARER_TOKEN: ${METRICS_BEARER_TOKEN:-}
  RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
  RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-120}
  AUTH_RATE_LIMIT_WINDOW_MS: ${AUTH_RATE_LIMIT_WINDOW_MS:-60000}
  AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-10}
  REFRESH_TOKEN_COOKIE_SECURE: ${REFRESH_TOKEN_COOKIE_SECURE:-}
  ADMIN_EMAIL: ${ADMIN_EMAIL:-}
  ADMIN_USERNAME: ${ADMIN_USERNAME:-}
  ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
  MAIL_HOST: ${MAIL_HOST:-}
  MAIL_PORT: ${MAIL_PORT:-}
  MAIL_USER: ${MAIL_USER:-}
  MAIL_PASSWORD: ${MAIL_PASSWORD:-}
  MAIL_FROM: ${MAIL_FROM:-}
  GMAIL_USER: ${GMAIL_USER:-}
  GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
  ALIBABA_CLOUD_ACCESS_KEY_ID: ${ALIBABA_CLOUD_ACCESS_KEY_ID:-}
  ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET:-}
  MINIPROGRAM_APPID: ${MINIPROGRAM_APPID:-}
  MINIPROGRAM_SECRET: ${MINIPROGRAM_SECRET:-}
  MINIO_ENDPOINT: ${MINIO_ENDPOINT:-localhost}
  MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9002}
  MINIO_INTERNAL_ENDPOINT: ${MINIO_INTERNAL_ENDPOINT:-minio}
  MINIO_INTERNAL_PORT: ${MINIO_INTERNAL_PORT:-9000}
  MINIO_INTERNAL_USE_SSL: ${MINIO_INTERNAL_USE_SSL:-false}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-nestweb_minio}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-nestweb_minio_password}
  MINIO_DEFAULT_BUCKET: ${MINIO_DEFAULT_BUCKET:-nestweb}
  OSS_CDN_URL: ${OSS_CDN_URL:-}
  CORS_ORIGINS: ${CORS_ORIGINS:-}
  SMS_DRY_RUN: ${SMS_DRY_RUN:-true}

services:
  migrate:
    container_name: nestweb-migrate
    build:
      context: .
    command: ["pnpm", "exec", "prisma", "migrate", "deploy"]
    environment: *api-environment
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    container_name: nestweb-api
    build:
      context: .
    ports:
      - "3030:3030"
    environment: *api-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://127.0.0.1:3030/api/health/ready'', r => process.exit(r.statusCode === 200 ? 0 : 1)).on(''error'', () => process.exit(1))"',
        ]
      interval: 30s
      timeout: 5s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg17
    container_name: nestweb-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nestweb}
      POSTGRES_USER: ${POSTGRES_USER:-nestweb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nestweb_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: nestweb-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: nestweb-rabbitmq
    command: sh -c "rabbitmq-plugins enable --offline rabbitmq_prometheus && rabbitmq-server"
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-nestweb}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-nestweb_password}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "rabbitmq-diagnostics -q ping && rabbitmq-diagnostics -q check_port_connectivity",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  minio:
    image: minio/minio:latest
    container_name: nestweb-minio
    command: server /data --console-address ':9001'
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-nestweb_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-nestweb_minio_password}
    volumes:
      - minio_data:/data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: nestweb-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: nestweb-grafana
    ports:
      - "3300:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: nestweb_default
